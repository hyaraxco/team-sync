# Security headers for Team Sync frontend
# Place in Nginx server block or include in main config

# HSTS - Force HTTPS for 1 year, include subdomains, preload
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Prevent clickjacking
add_header X-Frame-Options "DENY" always;

# Control referrer information
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy - restrict sensitive features
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# CSP (report-only for 1 week, then enforce)
# Report-Only allows monitoring before enforcement
# After 1 week, change to Content-Security-Policy (remove -Report-Only)
add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.teamsync.com; font-src 'self' data:;" always;

# Additional security headers
add_header X-XSS-Protection "1; mode=block" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# Cache control for static assets
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# Security headers for HTML pages
location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
}

# Notes:
# 1. Update connect-src in CSP to match your API domain
# 2. After 1 week of monitoring CSP reports, change to:
#    add_header Content-Security-Policy "default-src 'self'; ..." always;
# 3. Remove 'unsafe-inline' and 'unsafe-eval' from script-src if possible
# 4. Consider adding nonce-based CSP for inline scripts