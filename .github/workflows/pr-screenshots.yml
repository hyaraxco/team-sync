name: PR Screenshots

on:
  pull_request:
    branches:
      - main
      - development

concurrency:
  group: pr-screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: team_sync_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql
          coverage: none

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Playwright browsers
        working-directory: team-sync-fe
        run: bunx playwright install chromium --with-deps

      - name: Setup Backend
        working-directory: team-sync-be
        env:
          GITHUB_TOKEN: ""
        run: |
          cp .env.example .env
          sed -i 's/DB_DATABASE=teamsync_api/DB_DATABASE=team_sync_test/' .env
          sed -i 's/^DB_USERNAME=$/DB_USERNAME=root/' .env
          sed -i 's/^DB_PASSWORD=$/DB_PASSWORD=root/' .env
          sed -i 's/REDIS_HOST=redis/REDIS_HOST=127.0.0.1/' .env
          sed -i 's/QUEUE_CONNECTION=sync/QUEUE_CONNECTION=database/' .env
          echo 'SCOUT_DRIVER=null' >> .env
          composer install --no-interaction --prefer-dist
          php artisan key:generate
          php artisan migrate --force
          php artisan db:seed --force

      - name: Setup Frontend
        working-directory: team-sync-fe
        run: |
          cp .env.example .env 2>/dev/null || true
          bun install --frozen-lockfile

      - name: Start Backend
        working-directory: team-sync-be
        run: |
          php artisan serve --host=0.0.0.0 --port=8000 &
          php artisan queue:work &
          sleep 5

      - name: Start Frontend
        working-directory: team-sync-fe
        run: |
          VITE_API_BASE_URL=http://localhost:8000/api/v1 bun run dev --host 0.0.0.0 --port=4173 &
          sleep 10

      - name: Run Playwright Screenshots
        working-directory: team-sync-fe
        env:
          E2E_FE_BASE_URL: http://127.0.0.1:4173
          VITE_API_BASE_URL: http://127.0.0.1:8000/api/v1
        run: |
          # Create screenshot script
          cat > /tmp/screenshot-tests.ts << 'SCRIPT'
          import { test, expect } from '@playwright/test';
          
          const ROLES = [
            { email: 'agung@teamsync.com', password: 'teamsync', role: 'staff', name: 'Staff' },
            { email: 'yudhis@teamsync.com', password: 'teamsync', role: 'manager', name: 'Manager' },
            { email: 'tasyia@teamsync.com', password: 'teamsync', role: 'hr', name: 'HR' },
            { email: 'dwimeta@teamsync.com', password: 'teamsync', role: 'finance', name: 'Finance' },
          ];
          
          async function login(page: any, email: string, password: string) {
            await page.goto('/auth/login');
            await page.fill('input[type="email"]', email);
            await page.fill('input[type="password"]', password);
            await page.click('button[type="submit"]');
            await page.waitForURL('**/admin/**', { timeout: 15000 });
          }
          
          for (const role of ROLES) {
            test(`${role.name} - Dashboard`, async ({ page }) => {
              await login(page, role.email, role.password);
              await page.waitForTimeout(2000);
              await page.screenshot({ 
                path: `screenshots/${role.role}-dashboard.png`,
                fullPage: true 
              });
            });
          
            test(`${role.name} - Sidebar Navigation`, async ({ page }) => {
              await login(page, role.email, role.password);
              await page.waitForTimeout(1000);
              await page.screenshot({ 
                path: `screenshots/${role.role}-sidebar.png`,
                clip: { x: 0, y: 0, width: 280, height: 900 }
              });
            });
          }
          
          test('Login Page', async ({ page }) => {
            await page.goto('/auth/login');
            await page.waitForTimeout(1000);
            await page.screenshot({ 
              path: 'screenshots/login-page.png',
              fullPage: true 
            });
          });
          SCRIPT
          
          # Run screenshot tests
          bunx playwright test /tmp/screenshot-tests.ts --reporter=list 2>&1 || true

      - name: Upload Screenshots
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pr-screenshots
          path: team-sync-fe/screenshots/
          retention-days: 30

      - name: Comment PR with Screenshots
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const screenshotDir = 'team-sync-fe/screenshots';
            if (!fs.existsSync(screenshotDir)) {
              console.log('No screenshots directory found');
              return;
            }
            
            const files = fs.readdirSync(screenshotDir).filter(f => f.endsWith('.png'));
            if (files.length === 0) {
              console.log('No screenshots found');
              return;
            }
            
            // Build comment body
            let body = '## 📸 PR Screenshots\n\n';
            body += 'Automated screenshots captured by Playwright:\n\n';
            
            // Group by role
            const roles = ['staff', 'manager', 'hr', 'finance'];
            for (const role of roles) {
              const roleFiles = files.filter(f => f.startsWith(role));
              if (roleFiles.length > 0) {
                body += `### ${role.charAt(0).toUpperCase() + role.slice(1)} View\n`;
                for (const file of roleFiles) {
                  const name = file.replace('.png', '').replace(/-/g, ' ').replace(role, '').trim();
                  body += `- **${name || 'view'}**: \`${file}\`\n`;
                }
                body += '\n';
              }
            }
            
            // Add other screenshots
            const otherFiles = files.filter(f => !roles.some(r => f.startsWith(r)));
            if (otherFiles.length > 0) {
              body += '### Other\n';
              for (const file of otherFiles) {
                body += `- \`${file}\`\n`;
              }
              body += '\n';
            }
            
            body += '---\n';
            body += '> Screenshots are available as artifacts in this workflow run.\n';
            body += '> Download them from the "Artifacts" section above.';
            
            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existingComment = comments.find(c => 
              c.user.type === 'Bot' && c.body.includes('PR Screenshots')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
