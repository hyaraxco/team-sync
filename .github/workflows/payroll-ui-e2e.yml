name: Payroll UI E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/payroll-ui-e2e.yml"
      - "team-sync-fe/**"
      - "team-sync-be/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/payroll-ui-e2e.yml"
      - "team-sync-fe/**"
      - "team-sync-be/**"

concurrency:
  group: payroll-ui-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fe-guard-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun install cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            team-sync-fe/node_modules
          key: ${{ runner.os }}-bun-guards-${{ hashFiles('team-sync-fe/bun.lock', 'team-sync-fe/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-guards-

      - name: Install FE dependencies
        working-directory: team-sync-fe
        run: bun install --frozen-lockfile

      - name: Run FE guard smoke precheck
        working-directory: team-sync-fe
        run: bun run test:guards

  payroll-ui-e2e:
    needs: fe-guard-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      E2E_FE_BASE_URL: http://127.0.0.1:4173
      VITE_API_BASE_URL: http://127.0.0.1:8000/api/v1
      E2E_BE_DIR: ../team-sync-be
      E2E_BE_COMPOSE_CMD: docker compose

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun install cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            team-sync-fe/node_modules
          key: ${{ runner.os }}-bun-e2e-${{ hashFiles('team-sync-fe/bun.lock', 'team-sync-fe/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-e2e-
            ${{ runner.os }}-bun-guards-

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('team-sync-fe/bun.lock', 'team-sync-fe/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install FE dependencies
        working-directory: team-sync-fe
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium and Linux deps
        working-directory: team-sync-fe
        run: bunx playwright install --with-deps chromium

      - name: Docker preflight
        run: |
          set -euo pipefail
          docker info
          docker compose version

      - name: Prepare backend env file
        working-directory: team-sync-be
        run: |
          cp .env.example .env
          if ! grep -q '^DB_ROOT_PASSWORD=' .env; then
            echo 'DB_ROOT_PASSWORD=rootpass' >> .env
          fi

      - name: Start backend containers
        working-directory: team-sync-be
        run: docker compose up -d mysql redis web

      - name: Wait for mysql and redis health
        working-directory: team-sync-be
        run: |
          set -euo pipefail
          for service in mysql redis; do
            container_id="$(docker compose ps -q "$service")"
            if [[ -z "$container_id" ]]; then
              echo "Container for $service is not running" >&2
              exit 1
            fi

            echo "Waiting for $service health..."
            for attempt in {1..30}; do
              status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container_id")"
              if [[ "$status" == "healthy" || "$status" == "none" ]]; then
                echo "$service is ready with status: $status"
                break
              fi

              if [[ "$attempt" -eq 30 ]]; then
                echo "$service did not become healthy in time" >&2
                docker inspect "$container_id" >&2 || true
                exit 1
              fi

              sleep 2
            done
          done

      - name: Generate backend app key
        working-directory: team-sync-be
        run: docker compose exec -T web php artisan key:generate --force

      - name: Wait for backend health endpoint
        run: |
          set -euo pipefail
          mkdir -p team-sync-fe/playwright-artifacts
          health_file="team-sync-fe/playwright-artifacts/backend-health-check.txt"

          for attempt in {1..60}; do
            if curl -fsS "${VITE_API_BASE_URL%/api/v1}/up" > "$health_file"; then
              echo "Backend health endpoint is ready."
              exit 0
            fi

            curl -sS "${VITE_API_BASE_URL%/api/v1}/up" > "$health_file" 2>&1 || true
            sleep 2
          done

          echo "Backend health endpoint did not become ready in time." >&2
          cat "$health_file" >&2 || true
          exit 1

      - name: Prepare payroll dataset
        working-directory: team-sync-fe
        run: bun run e2e:prepare:be

      - name: Run payroll E2E UI journey
        working-directory: team-sync-fe
        run: bun run e2e:ui

      - name: Collect backend docker logs on failure
        if: failure()
        run: |
          mkdir -p team-sync-fe/playwright-artifacts
          docker info > team-sync-fe/playwright-artifacts/docker-info.log 2>&1 || true
          docker compose version > team-sync-fe/playwright-artifacts/docker-compose-version.log 2>&1 || true
          cd team-sync-be
          docker compose ps > ../team-sync-fe/playwright-artifacts/backend-compose-ps.log || true
          docker compose logs web mysql redis > ../team-sync-fe/playwright-artifacts/backend-compose.log || true

      - name: Capture backend health endpoint on failure
        if: failure()
        run: |
          mkdir -p team-sync-fe/playwright-artifacts
          curl -i -sS "${VITE_API_BASE_URL%/api/v1}/up" > team-sync-fe/playwright-artifacts/backend-health-last-response.log 2>&1 || true

      - name: Write success summary
        if: success()
        run: |
          {
            echo "## Payroll UI E2E"
            echo ""
            echo "- FE URL: \`${E2E_FE_BASE_URL}\`"
            echo "- BE URL: \`${VITE_API_BASE_URL%/api/v1}\`"
            echo "- Accounts:"
            echo "  - HR: \`tasyia@teamsync.com / teamsync\`"
            echo "  - Manager: \`yudhis@teamsync.com / teamsync\`"
            echo "  - Employee: \`agung@teamsync.com / teamsync\`"
            echo "  - Finance: \`dwimeta@teamsync.com / teamsync\`"
            echo "- Artifacts: \`team-sync-fe/playwright-report\`, \`team-sync-fe/test-results\`, \`team-sync-fe/playwright-artifacts\`"
            echo "- Scenario status:"
            echo "  - manager deny payroll + no request leave quick action: PASS"
            echo "  - hr pending payroll draft + duplicate month guard + no process action: PASS"
            echo "  - finance export payroll report + mark as paid + auto-notification info: PASS"
            echo "  - employee my payroll detail/download + admin route deny: PASS"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write failure summary
        if: failure()
        run: |
          {
            echo "## Payroll UI E2E"
            echo ""
            echo "- FE URL: \`${E2E_FE_BASE_URL}\`"
            echo "- BE URL: \`${VITE_API_BASE_URL%/api/v1}\`"
            echo "- Accounts:"
            echo "  - HR: \`tasyia@teamsync.com / teamsync\`"
            echo "  - Manager: \`yudhis@teamsync.com / teamsync\`"
            echo "  - Employee: \`agung@teamsync.com / teamsync\`"
            echo "  - Finance: \`dwimeta@teamsync.com / teamsync\`"
            echo "- Artifacts: \`team-sync-fe/playwright-report\`, \`team-sync-fe/test-results\`, \`team-sync-fe/playwright-artifacts\`"
            echo "- Scenario status:"
            echo "  - manager deny payroll + no request leave quick action: check Playwright report"
            echo "  - hr pending payroll draft + duplicate month guard + no process action: check Playwright report"
            echo "  - finance export payroll report + mark as paid + auto-notification info: check Playwright report"
            echo "  - employee my payroll detail/download + admin route deny: check Playwright report"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payroll-ui-e2e-artifacts
          if-no-files-found: warn
          path: |
            team-sync-fe/playwright-report
            team-sync-fe/test-results
            team-sync-fe/playwright-artifacts
